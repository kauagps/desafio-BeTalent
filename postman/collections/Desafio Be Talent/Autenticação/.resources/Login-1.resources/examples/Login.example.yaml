  statusCode: 200
  statusText: OK
  headers:
    host: localhost:8000
    connection: close
    x-powered-by: PHP/8.5.3
    cache-control: no-cache, private
    date: Thu, 12 Mar 2026 20:53:57 GMT
    content-type: application/json
    access-control-allow-origin: http://localhost:3000
    access-control-allow-credentials: "true"
