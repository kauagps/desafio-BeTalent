$kind: http-example
description: Este endpoint autentica o usuário e retorna um Bearer Token. Envie
  o e-mail e senha cadastrados via Seeder.
request:
  url: "{{base_url}}/login"
  method: POST
  headers:
    Accept: application/json
    Content-Type: application/json
  body:
    type: json
    content: "{\r

      \    \"email\": \"admin@teste.com\",\r

      \    \"password\": \"password\"\r

      }"
